# Plataforma: studio.x09.com.br → Next.js (PM2 porta 3001)
# Publish wildcard será adicionado no Sprint 7.

server {
    listen 80;
    listen [::]:80;
    server_name studio.x09.com.br;

    # Em produção com Cloudflare Full (strict), use o bloco 443 com cert Origin.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name studio.x09.com.br;

    # Ajuste para o Origin Certificate da Cloudflare (mesmo padrão do x09)
    ssl_certificate     /etc/ssl/x09/cert.pem;
    ssl_certificate_key /etc/ssl/x09/key.pem;

    client_max_body_size 32m;

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

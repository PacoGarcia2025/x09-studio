name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-next:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test agent
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_dummy
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_ci_dummy
          SUPABASE_SECRET_KEY: sb_secret_ci_dummy
          SUPABASE_SERVICE_ROLE_KEY: sb_secret_ci_dummy
          GEMINI_API_KEY: dummy-key-for-ci
          OPENROUTER_API_KEY: dummy-key-for-ci
          GROQ_API_KEY: dummy-key-for-ci

  build-visual-mvp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/studio-visual-mvp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/studio-visual-mvp/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_ci_dummy
          VITE_API_BASE: ""
